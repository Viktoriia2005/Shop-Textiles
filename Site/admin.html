<!DOCTYPE html>
<html lang="ua">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
  <link rel="manifest" href="img/site.webmanifest">
  <title>Адмін-панель</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shantell+Sans:ital,wght@0,300..800;1,300..800&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <link rel="stylesheet" href="admin.css">
</head>

<body>
  <header class="container-fluid py-3 border-bottom">
    <div class="row align-items-center">
      <div class="col-md-2 text-start">
        <img src="img/Icon_Shop.png" alt="Логотип" width="135" height="135">
      </div>
      <div class="col-md-8 text-center">
        <h1 class="mb-0">Панель керування адміністратора <span id="admin-name"></span></h1>
      </div>
      <div class="col-md-2 d-flex justify-content-end pe-4">
        <button id="admin-auth-btn" class="logout">Вихід</button>
      </div>
    </div>
  </header>
  </header>
  <div class="d-flex justify-content-end position-relative">
    <form id="searchAdmin" class="search-box d-flex my-3 w-100" role="search">
      <div class="w-100 position-relative">
        <input id="searchInput" class="form-control me-2" type="search" name="query" placeholder="Пошук товару..."
          aria-label="Search" required>
        <div id="searchHints" class="list-group position-absolute w-100"></div>
      </div>
      <button class="btn btn-custom" type="submit">Знайти</button>
    </form>
  </div>
  <div id="searchFeedback" class="mt-2 text-end"></div>
  <section class="col-md-9">
    <div id="adminList" class="row row-cols-3 g-4 justify-content-center"></div>
  </section>
  <button class="add-btn" id="add-product">+</button>
  <!-- Модальне вікно -->
  <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title" id="deleteModalLabel">Видалити товар?</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
        </div>

        <div class="modal-body">
          <p>Чи точно ви хочете видалити товар: <strong id="productNameToDelete"></strong>?</p>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn edit-btn" data-bs-dismiss="modal">Закрити</button>
          <button type="button" class="btn delete-btn" id="confirmDeleteBtn">Видалити</button>
        </div>

      </div>
    </div>
  </div>

  <!-- popup message element (hidden by default) -->
  <div id="popup-message" style="display: none;" role="alert"></div>

  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>

</html>
