<!DOCTYPE html>
<html lang="ua">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
  <link rel="manifest" href="img/site.webmanifest">
  <title>Форма додавання/редагування товару</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shantell+Sans:ital,wght@0,300..800;1,300..800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="admin-form.css">
</head>

<body>
  <header class="container-fluid py-3 border-bottom">
    <div class="row align-items-center">
      <div class="col-md-2 text-start">
        <img src="img/Icon_Shop.png" alt="Логотип" width="135" height="135">
      </div>
      <div class="col-md-8 text-center">
        <h1 class="mb-0">Панель керування адміністратора <span id="admin-name"></span></h1>
      </div>
    </div>
  </header>
  <main>
    <div class="container my-5">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h3 class="text-center mb-4">Додати/редагувати товар</h3>
              <form id="adminForm">
                <div class="mb-3">
                  <input id="field-name" type="text" name="name" class="form-control" placeholder="Назва товару"
                    required>
                </div>
                <div class="mb-3">
                  <textarea id="field-description" name="description" class="form-control" rows="4"
                    placeholder="Опис товару"></textarea>
                </div>
                <div class="mb-3">
                  <input id="field-price" type="number" name="price" class="form-control" step="0.01"
                    placeholder="Ціна товару" required>
                </div>
                <div class="mb-3">
                  <label for="field-photo-file" class="form-label mb-1">Фото товару</label>
                  <input id="field-photo-file" type="file" class="form-control" accept="image/*">
                  <div id="photo-help" class="form-text">Select file from img folder.</div>
                  <div id="photo-file-path" class="form-text mt-1"></div>
                  <img id="photo-preview" alt="Прев’ю фото" style="display:none; max-width: 200px; margin-top: 10px; border: 1px solid #ccc; padding: 5px;">
                  <input id="field-photo" type="hidden" name="photo">
                </div>
                <div class="mb-3">
                  <input id="field-quantity" type="number" name="quantity" class="form-control"
                    placeholder="Кількість товару">
                </div>
                <button id="save-btn" type="submit" class="btn btn-custom">Додати</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="form-actions-bottom">
      <button class="btn btn-custom" id="back-to-catalog">Повернутися до каталогу</button>
    </div>
  </main>
  <!-- popup message element (hidden by default) -->
  <div id="popup-message" style="display: none;" role="alert"></div>

  <script src="config.js"></script>
  <script src="admin-form.js" defer></script>
</body>

</html>
