<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Кошик</title>
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
  <link rel="manifest" href="img/site.webmanifest">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shantell+Sans:ital,wght@0,300..800;1,300..800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="Cart.css">
</head>

<body>
  <header class="container-fluid py-3 border-bottom">
    <div class="row align-items-center">
      <div class="col-md-2 text-start">
        <img src="img/Icon_Shop.png" alt="Логотип" width="135" height="135">
      </div>
      <div class="col-md-8 text-center">
        <h1 class="mb-0">Moya.domivka_ua</h1>
      </div>
      <div class="col-md-2 text-end">
        <div id="avatarLink" class="user-avatar-wrapper position-relative me-3">
          <img src="img/avatar.png" alt="Акаунт" id="avatarIcon" width="40">
          <div id="userNameRibbon" class="username-ribbon"></div>
        </div>
      </div>
    </div>
  </header>
  <nav class="navbar navbar-expand-md navbar-light bg-light">
    <div class="container">
      <ul class="navbar-nav mx-auto fs-5">
        <li class="nav-item mx-3"><a class="nav-link text-dark" href="Home_page.html">Головна</a></li>
        <li class="nav-item mx-3"><a class="nav-link text-dark" href="Delivery_and_payment.html">Доставка й оплата</a>
        </li>
        <li class="nav-item mx-3"><a class="nav-link text-dark" href="About.html">Про нас</a></li>
        <li class="nav-item mx-3"><a class="nav-link text-dark" href="Contact.html">Контакти</a></li>
      </ul>
    </div>
  </nav>
  <main class="container my-5">
    <h2 class="text-center mb-4">Ваш кошик</h2>

    <!-- 🔹 Контейнер для товарів -->
    <div id="cart-items"></div>

    <!-- 🔹 Підсумок -->
    <div id="cart-summary" class="row justify-content-end mt-4">
      <div class="col-md-6">
        <div class="card bg-light border-0 shadow-sm">
          <div class="card-body text-end">
            <p class="mb-1">Сума: <strong id="cart-total">0 ₴</strong></p>
            <p class="mb-3">До сплати: <strong id="cart-total-final">0 ₴</strong></p>
            <button class="btn btn-custom w-100" id="checkout-btn">Оформити замовлення</button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <footer class="bg-dark text-dark py-3 mt-auto">
    <div class="container text-center">
      <p>&copy; <span id="year"></span> Moya.domivka_ua. Усі права захищено.</p>
      <div class="footer-links d-flex flex-column align-items-center">
        <a href="Home_page.html" class="text-dark text-decoration-none mb-2">Головна</a>
        <a href="Delivery_and_payment.html" class="text-dark text-decoration-none mb-2">Доставка й оплата</a>
        <a href="About.html" class="text-dark text-decoration-none mb-2">Про нас</a>
        <a href="Contact.html" class="text-dark text-decoration-none mb-2">Контакти</a>
      </div>
    </div>
  </footer>

  <!-- Модальне вікно для імітації оплати -->
  <!-- Модальне вікно для імітації оплати -->
  <div class="modal fade" id="paymentModal" tabindex="-1" aria-labelledby="paymentLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="paymentForm">
          <div class="modal-header">
            <h5 class="modal-title" id="paymentLabel">Оплата замовлення</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="cardNumber" class="form-label">Номер картки</label>
              <input type="text" class="form-control" id="cardNumber" placeholder="0000 0000 0000 0000" required>
            </div>
            <div class="mb-3">
              <label for="expiryDate" class="form-label">Термін дії</label>
              <input type="text" class="form-control" id="expiryDate" placeholder="MM/YY" required>
            </div>
            <div class="mb-3">
              <label for="cvv" class="form-label">CVV</label>
              <input type="text" class="form-control" id="cvv" placeholder="123" required>
            </div>
            <div class="mb-3">
              <label for="method" class="form-label">Спосіб оплати</label>
              <select id="method" class="form-select" required>
                <option value="card">Банківська картка</option>
                <option value="paypal">PayPal (імітація)</option>
                <option value="googlepay">Google Pay (імітація)</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-custom">Оплатити</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="Cart.js"></script>
  <div id="popup-message" style="display: none;"></div>
</body>

</html>
