<!DOCTYPE html>
<html lang="ua">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
    <link rel="manifest" href="img/site.webmanifest">
    <title>Доставка і оплата</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shantell+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="Delivery_and_payment.css">
</head>

<body>
    <header class="container-fluid py-3 border-bottom">
        <div class="row align-items-center">
            <div class="col-md-2 text-start">
                <img src="img/Icon_Shop.png" alt="Логотип" width="135" height="135">
            </div>
            <div class="col-md-8 text-center">
                <h1 class="mb-0">Moya.domivka_ua</h1>
            </div>
            <div class="col-md-2 text-end">
                <div id="avatarLink" class="user-avatar-wrapper position-relative me-3" role="button" aria-label="Акаунт">
                    <img src="img/avatar.png" alt="Акаунт" width="40">
                    <div id="userNameRibbon" class="username-ribbon"></div>
                </div>
                <a href="Cart.html" class="me-3">
                    <img src="img/cart.png" alt="Корзинка" width="40">
                </a>
            </div>
        </div>
    </header>
    <nav class="navbar navbar-expand-md navbar-light bg-light">
        <div class="container nav-search-row">
            <ul class="navbar-nav nav-links fs-5">
                <li class="nav-item mx-3"><a class="nav-link text-dark text-decoration-none"
                        href="Home_page.html">Головна</a></li>
                <li class="nav-item mx-3"><a class="nav-link text-dark text-decoration-none" href="About.html">Про
                        нас</a>
                </li>
                <li class="nav-item mx-3"><a class="nav-link text-dark text-decoration-none"
                        href="Contact.html">Контакти</a>
                </li>
            </ul>
                        <form id="searchForm" class="search-box d-flex align-items-center" role="search">
                <div class="search-input-wrap position-relative">
                    <input id="searchInput" class="form-control" type="search" name="query"
                        placeholder="Шукати..." aria-label="Пошук" required>
                    <div id="searchHints" class="list-group position-absolute w-100"></div>
                </div>
                <button class="search-submit" type="submit" aria-label="Шукати">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="11" cy="11" r="6.5"></circle>
                        <path d="M16 16L21 21"></path>
                    </svg>
                </button>
            </form>
        </div>
    </nav>
    <div id="searchFeedback" class="mt-2 text-end"></div>
    <div id="searchResults" class="container row g-4 mt-3 mx-auto"></div>
    <main>
        <section class="delivery-info my-5">
            <div class="container">
                <div class="row justify-content-center text-center">
                    <div class="col-md-5 mb-3">
                        <div class="info-box p-3 rounded shadow-sm">
                            <p class="mb-0">🚚 Доставка <strong>Укрпоштою</strong> та <strong>Новою поштою</strong> по
                                всій Україні</p>
                        </div>
                    </div>
                    <div class="col-md-5 mb-3">
                        <div class="info-box p-3 rounded shadow-sm">
                            <p class="mb-0">💳 Повна передоплата або <strong>накладений платіж</strong> з передоплатою
                                <strong>120 грн</strong>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer class="bg-dark text-dark py-3 mt-auto">
        <div class="container text-center">
            <p>&copy; <span id="year"></span> Moya.domivka_ua. Усі права захищено.</p>
            <div class="footer-links d-flex flex-column align-items-center">
                <a href="Home_page.html" class="text-dark text-decoration-none mb-2">Головна</a>
                <a href="Delivery_and_payment.html" class="text-dark text-decoration-none mb-2">Доставка й оплата</a>
                <a href="About.html" class="text-dark text-decoration-none mb-2">Про нас</a>
                <a href="Contact.html" class="text-dark text-decoration-none mb-2">Контакти</a>
            </div>
        </div>
    </footer>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const yearSpan = document.getElementById("year");
            if (yearSpan) {
                yearSpan.textContent = new Date().getFullYear();
            }
        });
    </script>
    <script src="config.js"></script>
    <script src="searchForm.js"></script>
    <script src="account-link.js"></script>
</body>

</html>
