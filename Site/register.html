<!DOCTYPE html>
<html lang="ua">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
  <link rel="manifest" href="img/site.webmanifest">
  <title>Регістрація</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shantell+Sans:ital,wght@0,300..800;1,300..800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="register.css">
</head>

<body>
  <header class="container-fluid py-3 border-bottom">
    <div class="row align-items-center">
      <div class="col-md-2 text-start">
        <img src="img/Icon_Shop.png" alt="Логотип" width="135" height="135">
      </div>
      <div class="col-md-8 text-center">
        <h1 class="mb-0">Moya.domivka_ua</h1>
      </div>
      <div class="col-md-2 text-end">
        <a href="Cart.html" class="me-3">
          <img src="img/cart.png" alt="Корзинка" width="40">
        </a>
      </div>
    </div>
  </header>
  <nav class="navbar navbar-expand-md navbar-light bg-light">
    <div class="container">
      <ul class="navbar-nav mx-auto fs-5">
        <li class="nav-item mx-3"><a class="nav-link text-dark text-decoration-none" href="Home_page.html">Головна</a>
        </li>
        <li class="nav-item mx-3"><a class="nav-link text-dark text-decoration-none"
            href="Delivery_and_payment.html">Доставка й оплата</a></li>
        <li class="nav-item mx-3"><a class="nav-link text-dark text-decoration-none" href="About.html">Про
            нас</a>
        </li>
        <li class="nav-item mx-3"><a class="nav-link text-dark text-decoration-none" href="Contact.html">Контакти</a>
        </li>
      </ul>
    </div>
  </nav>
  <div class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h3 class="text-center mb-4">Реєстрація</h3>
            <form id="registerForm" role="form">
              <div class="mb-3">
                <input type="text" class="form-control" name="name" placeholder="Ім’я користувача" required autofocus>
              </div>
              <div class="mb-3">
                <input type="email" class="form-control" name="email" placeholder="Email" required autocomplete="email">
              </div>
              <div class="mb-3">
                <input type="password" class="form-control" name="password" placeholder="Пароль" required
                  autocomplete="new-password">
              </div>
              <button type="submit" class="btn btn-custom w-100">Зареєструватися</button>
            </form>
            <div id="message" class="text-center mt-3">
          </div>
          <p class="text-center mt-3">Вже маєте акаунт? <br> <a href="login.html"
              class="text-decoration-none text-dark">Увійти</a></p>
        </div>
      </div>
    </div>
  </div>
  </div>
  <footer class="bg-dark text-dark py-3 mt-auto">
    <div class="container text-center">
      <p>&copy; <span id="year"></span> Moya.domivka_ua. Усі права захищено.</p>
      <div class="footer-links d-flex flex-column align-items-center">
        <a href="Home page.html" class="text-dark text-decoration-none mb-2">Головна</a>
        <a href="Delivery and payment.html" class="text-dark text-decoration-none mb-2">Доставка й оплата</a>
        <a href="About.html" class="text-dark text-decoration-none mb-2">Про нас</a>
        <a href="Contact.html" class="text-dark text-decoration-none mb-2">Контакти</a>
      </div>
    </div>
  </footer>
  <script src="config.js"></script>
  <script src="register.js"></script>
</body>

</html>
